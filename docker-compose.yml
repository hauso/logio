services:
  php:
    container_name: php
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /app
    env_file:
      - .env
    volumes:
      - ./:/app
    networks:
      - network
    depends_on:
      - mysql
      - elasticsearch

  nginx:
    container_name: nginx
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./:/app:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - network
    depends_on:
      - php

  mysql:
    container_name: mysql
    image: mysql:8.4
    ports:
      - "33061:3306"
    environment:
      MYSQL_DATABASE: logio
      MYSQL_USER: logio
      MYSQL_PASSWORD: logio
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "logio", "--password=logio"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - network

  adminer:
    container_name: adminer
    image: adminer:latest
    ports: ["8081:8080"]
    depends_on: [mysql]
    networks:
      - network

  elasticsearch:
    container_name: elasticsearch
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    ports:
      - "9200:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - network

volumes:
  mysql-data:
    name: mysql-data
  elasticsearch-data:
    name: elasticsearch-data

networks:
  network:
    name: network
    driver: bridge
