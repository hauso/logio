services:
  logio-php:
    container_name: logio-php
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /app
    volumes:
      - ./:/app
    networks:
      - logio-network
    depends_on:
      - logio-mysql
      - logio-elasticsearch

  logio-nginx:
    container_name: logio-nginx
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./:/app:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - logio-network
    depends_on:
      - logio-php

  logio-mysql:
    container_name: logio-mysql
    image: mysql:8.4
    ports:
      - "33061:3306"
    environment:
      MYSQL_DATABASE: logio
      MYSQL_USER: logio
      MYSQL_PASSWORD: logio
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - logio-mysql-data:/var/lib/mysql
    networks:
      - logio-network

  logio-elasticsearch:
    container_name: logio-elasticsearch
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    ports:
      - "9200:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - logio-elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - logio-network

volumes:
  logio-mysql-data:
    name: logio-mysql-data
  logio-elasticsearch-data:
    name: logio-elasticsearch-data

networks:
  logio-network:
    name: logio-network
    driver: bridge
